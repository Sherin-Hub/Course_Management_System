<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password – LMS Portal</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .auth-wrap.narrow {
      max-width: 500px;
      grid-template-columns: 1fr;
    }
    .auth-wrap.narrow .auth-left { display: none; }
    .auth-wrap.narrow .auth-right { padding: 48px 44px; }
  </style>
</head>
<body>

<!-- Navigation -->
<nav>
  <div class="nav-brand">
    <div class="brand-dot">L</div>
    LMS Portal
  </div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="register.html">Register</a></li>
    <li><a href="login.html" class="nav-btn">Login</a></li>
  </ul>
</nav>

<!-- Auth page -->
<div class="auth-page">
  <div class="auth-wrap narrow">
    <div class="auth-right">

      <div class="auth-icon-top" style="margin:0 auto 18px;">🔑</div>
      <div class="eyebrow" style="text-align:center;">Reset password</div>
      <h1 style="text-align:center;">Set a new password</h1>
      <p class="sub-text" style="text-align:center;margin-bottom:4px;">
        Enter the 6-digit code we sent to your email, then choose a new password.
      </p>

      <p style="text-align:center;font-size:12.5px;color:#2563eb;font-weight:600;margin-bottom:4px;">
        Demo OTP: <strong>123456</strong>
      </p>

      <!-- OTP boxes -->
      <div class="otp-row">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" />
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" />
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" />
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" />
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" />
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" />
      </div>
      <span class="err-msg" id="otpError" style="text-align:center;display:block;margin-top:-8px;margin-bottom:12px;"></span>

      <form id="resetForm" novalidate>

        <div class="field">
          <label for="newPassword">New password</label>
          <div class="input-wrap">
            <input id="newPassword" type="password" placeholder="Min. 8 characters" autocomplete="new-password" />
            <button type="button" class="toggle-pw" aria-label="Show password">👁</button>
          </div>
          <div class="pw-strength">
            <div class="pw-strength-bar"><div class="pw-strength-fill" id="strengthFill"></div></div>
            <span class="pw-strength-label" id="strengthLabel"></span>
          </div>
          <span class="err-msg"></span>
        </div>

        <div class="field">
          <label for="confirmNewPassword">Confirm new password</label>
          <div class="input-wrap">
            <input id="confirmNewPassword" type="password" placeholder="Re-enter new password" autocomplete="new-password" />
            <button type="button" class="toggle-pw" aria-label="Show password">👁</button>
          </div>
          <span class="err-msg"></span>
        </div>

        <button type="submit" class="form-btn">Reset password →</button>
      </form>

      <div class="form-footer" style="margin-top:20px;">
        Didn't receive the code? <a href="forgot-password.html">Resend code</a>
        &nbsp;|&nbsp; <a href="login.html">Back to login</a>
      </div>

    </div>
  </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
