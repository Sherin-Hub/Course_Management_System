<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password – LMS Portal</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .auth-wrap.narrow {
      max-width: 480px;
      grid-template-columns: 1fr;
    }
    .auth-wrap.narrow .auth-left { display: none; }
    .auth-wrap.narrow .auth-right { padding: 52px 44px; }

    .steps-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 30px;
      justify-content: center;
    }
    .step-dot {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
      background: #e2e8f0;
      color: #64748b;
    }
    .step-dot.active { background: #2563eb; color: #fff; }
    .step-dot.done   { background: #16a34a; color: #fff; }
    .step-line { flex: 1; height: 2px; background: #e2e8f0; }
  </style>
</head>
<body>

<!-- Navigation -->
<nav>
  <div class="nav-brand">
    <div class="brand-dot">L</div>
    LMS Portal
  </div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="register.html">Register</a></li>
    <li><a href="login.html" class="nav-btn">Login</a></li>
  </ul>
</nav>

<!-- Auth page -->
<div class="auth-page">
  <div class="auth-wrap narrow">
    <div class="auth-right auth-center">

      <!-- Steps indicator -->
      <div class="steps-row">
        <div class="step-dot active" id="step1dot">1</div>
        <div class="step-line"></div>
        <div class="step-dot" id="step2dot">2</div>
      </div>

      <div class="auth-icon-top">🔒</div>
      <div class="eyebrow">Account recovery</div>
      <h1>Forgot your password?</h1>
      <p class="sub-text" style="max-width:340px;margin:0 auto 28px;">
        Enter the email address you registered with. We'll send a reset code to that address.
      </p>

      <form id="forgotForm" novalidate style="text-align:left;">
        <div class="field">
          <label for="forgotEmail">Registered email address</label>
          <input id="forgotEmail" type="email" placeholder="you@example.com" autocomplete="email" />
          <span class="err-msg"></span>
        </div>

        <button type="submit" class="form-btn">Send reset code →</button>
      </form>

      <div class="form-footer" style="margin-top:20px;">
        Remember your password? <a href="login.html">Back to login</a>
      </div>

      <div style="margin-top:18px;padding:12px 14px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:9px;font-size:12.5px;color:#64748b;text-align:left;">
        <strong style="color:#1a2e5a;">💡 Demo:</strong> Any registered email will advance you to the reset page. OTP is <strong>123456</strong>.
      </div>
    </div>
  </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
